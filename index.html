<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>へるぷろタレント掲示板</title>
    <style>
        /* ボディ背景色を変更 */
        body { font-family: sans-serif; margin: 0; background-color: #f7f3e8; color: #333; }
        
        /* ヘッダーの色: 葡萄染色 (#522f60) */
        header { background-color: #522f60; color: white; padding: 1.5em; text-align: center; }
        /* 変更：タイトル文言を「投稿はこちらから！」に */
        h1 { margin: 0; font-size: 1.8em; font-weight: bold; }

        /* 変更：メインコンテナのスタイル（白い角丸コンテナ） */
        main { padding: 40px; max-width: 680px; margin: 20px auto; background-color: white; border: 1px solid #d4d4d4; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* ラベルスタイル */
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 0.95em; color: #333; }
        .required-asterisk { color: red; font-weight: bold; } /* 必須マーク用 */
        .label-note { font-weight: normal; color: #666; font-size: 0.9em; margin-left: 5px; } /* 注釈用 */

        /* フォームグループ */
        .form-group { margin-bottom: 25px; }
        
        /* 入力フィールドスタイル */
        input[type="text"], input[type="email"], textarea { width: 100%; padding: 12px; border: 1px solid #dcdcdc; border-radius: 6px; box-sizing: border-box; font-size: 1em; }
        input[type="text"]:focus, input[type="email"]:focus, textarea:focus { border-color: #90b9d5; outline: none; }
        textarea { resize: vertical; height: 200px; font-family: inherit; line-height: 1.6; }
        
        /* 変更：アプリ選択チェックボックスのレイアウト */
        #app-selector { display: flex; flex-wrap: wrap; gap: 10px 20px; }
        #app-selector label { display: flex; align-items: center; gap: 8px; font-weight: normal; font-size: 0.9em; width: calc(33.33% - 14px); /* 3列 */ margin-bottom: 0; }
        #app-selector input[type="checkbox"] { margin: 0; width: 1.2em; height: 1.2em; }

        /* 変更：投稿者名・メールアドレスの2列レイアウト */
        #poster-info-container { display: flex; gap: 20px; margin-bottom: 25px; }
        #poster-info-container > .form-group { flex: 1; margin-bottom: 0; }

        /* 変更：フッター注釈用コンテナ */
        .footer-note-container { margin-bottom: 25px; text-align: left; }
        .footer-note { font-size: 0.9em; margin: 5px 0; color: #666; font-weight: normal; }

        /* 変更：送信ボタンのスタイル */
        button { background-color: #90b9d5; color: white; padding: 15px 30px; border: none; border-radius: 8px; cursor: pointer; font-size: 1.2em; font-weight: bold; width: 100%; }
        button:hover { opacity: 0.9; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        
        /* メッセージ */
        #message { text-align: center; margin: 20px 0; display: none; font-weight: bold; font-size: 1.1em; }
    </style>
</head>
<body>

<header>
    <h1>投稿はこちらから！</h1>
</header>

<main>
    <div id="message"></div>
    <form id="review-form">
        <div class="form-group">
            <label for="talent-name">紹介したいライバー <span class="required-asterisk">*</span> <span class="label-note">（※可能であれば推しマークまでご入力ください）</span></label>
            <input type="text" id="talent-name" name="talent-name" required placeholder="ライバーの名前">
        </div>

        <div class="form-group">
            <label>配信しているアプリ <span class="required-asterisk">*</span> <span class="label-note">（複数可）</span></label>
            <div id="app-selector">
                <label><input type="checkbox" name="apps" value="Pococha">Pococha</label>
                <label><input type="checkbox" name="apps" value="TikTok LIVE">TikTok LIVE</label>
                <label><input type="checkbox" name="apps" value="ColorSing">ColorSing</label>
                <label><input type="checkbox" name="apps" value="17LIVE">17LIVE</label>
                <label><input type="checkbox" name="apps" value="SHOWROOM">SHOWROOM</label>
                <label><input type="checkbox" name="apps" value="ミクチャ">ミクチャ</label>
                <label><input type="checkbox" name="apps" value="ドキドキライブ">ドキドキライブ</label>
                <label><input type="checkbox" name="apps" value="ふわっち">ふわっち</label>
                <label><input type="checkbox" name="apps" value="REALITY">REALITY</label>
                <label><input type="checkbox" name="apps" value="IRIAM">IRIAM</label>
                <label><input type="checkbox" name="apps" value="Palmu">Palmu</label>
            </div>
        </div>

        <div class="form-group">
            <label for="comment">コメント・エピソード <span class="required-asterisk">※</span></label>
            <textarea id="comment" name="comment" required placeholder="レビューコメント・エピソードを入力してください"></textarea>
        </div>

        <div id="poster-info-container">
            <div class="form-group">
                <label for="username">投稿者名 <span class="required-asterisk">※</span></label>
                <input type="text" id="username" name="username" required placeholder="例：長谷川太郎">
            </div>
            <div class="form-group">
                <label for="email">メールアドレス <span class="required-asterisk">※</span></label>
                <input type="email" id="email" name="email" required placeholder="例：example@mail.com">
            </div>
        </div>
        
        <div class="footer-note-container">
            <p class="footer-note">メールアドレスが公開されることはありません。</p>
            <p class="footer-note"><span class="required-asterisk">※</span> が付いている欄は必須項目です</p>
        </div>
        
        <button type="submit" id="submit-btn">この内容を送信する</button>
    </form>
</main>

<script>
    // --- 設定 ---
    // GAS ウェブアプリのURL
    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbzCpspfwuhBLffVwk-_Ba6lkKd1zdHUV1iueK4JJgcf_2FvOmMIgRgPgEDFN8a4yS5WPg/exec'; 

    // DOM要素の取得を更新
    const talentNameInputE = document.getElementById('talent-name'); // タレント名のテキスト入力を取得
    const appCheckboxes = document.querySelectorAll('#app-selector input[type="checkbox"]'); // アプリ選択チェックボックスを取得
    const messageE = document.getElementById('message');
    const reviewFormE = document.getElementById('review-form');
    const submitBtnE = document.getElementById('submit-btn');

    // --- レビュー表示機能は削除 (画像にはないため) ---

    // --- レビュー投稿機能 ---
    reviewFormE.addEventListener('submit', async function(e) {
        e.preventDefault(); // フォームのデフォルトの送信動作を無効化

        // データの取得を更新
        const talentName = talentNameInputE.value; // タレント名を取得
        const formData = new FormData(this);
        const username = formData.get('username');
        const email = formData.get('email');
        const comment = formData.get('comment');
        
        // 変更：選択されたアプリを配列に取得
        const apps = Array.from(appCheckboxes)
                          .filter(cb => cb.checked)
                          .map(cb => cb.value);

        // バリデーション：アプリが少なくとも1つ選択されているか
        if (apps.length === 0) {
            alert('「配信しているアプリ」を少なくとも1つ選択してください。');
            return;
        }

        // データオブジェクトの構成を変更
        const data = {
            talent_name: talentName, // 変更：プルダウンIDからテキスト名に
            apps: apps.join(', '), // 変更：科目(Subject)からアプリリスト(Apps)に（カンマ区切り文字列）
            username: username,
            email: email,
            comment: comment
        };

        submitBtnE.disabled = true; // ボタンを無効化
        messageE.innerText = '投稿中...';
        messageE.style.display = 'block';
        messageE.style.color = 'black';

        try {
            // POSTリクエストでデータを送信
            const response = await fetch(GAS_API_URL, {
                method: 'POST',
                body: JSON.stringify(data)
            });
            if (!response.ok) throw new Error('投稿エラー');
            const result = await response.json();

            if (result.result === 'success') {
                messageE.innerText = '投稿しました！ありがとうございます。';
                messageE.style.color = 'green';
                this.reset(); // フォームをリセット
                // 1.5秒後にメッセージを非表示に
                setTimeout(() => {
                    messageE.style.display = 'none';
                }, 1500); 
            } else {
                messageE.innerText = '投稿に失敗しました: ' + result.message;
                messageE.style.color = 'red';
            }

        } catch (error) {
            console.error('エラー:', error);
            messageE.innerText = '通信エラーが発生しました。時間をおいて再度お試しください。';
            messageE.style.color = 'red';
        } finally {
            submitBtnE.disabled = false; // ボタンを元に戻す
        }
    });

    // エスケープ処理（セキュリティ対策）
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&'`"<>]/g, function(match) {
            return {
                '&': '&amp;',
                "'": '&#39;',
                '`': '&#96;',
                '"': '&quot;',
                '<': '&lt;',
                '>': '&gt;'
            }[match];
        });
    }
</script>

</body>
</html>
